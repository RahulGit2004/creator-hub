name: social_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  image_picker: ^1.2.2
  http: ^1.6.0
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  readmore: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# FIXED: Global root configuration block with exact spacing
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # FIXED: Declared your asset directory so Flutter caches the image asset
  assets:
#    - assets/app_icon.png